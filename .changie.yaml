# Changie configuration file
# See https://changie.dev for details

changesDir: .changie
unreleasedDir: unreleased
commitTemplate: "chore(release): bump version to v{{.Version}}"
headerTemplate: |
  # Changelog
  All notable changes to this project will be documented in this file.
changelogPath: CHANGELOG.md
versionExt: md
versionHeaderTemplate: "## v{{.Version}} - {{.Date}}"
versionFooterTemplate: ""
changeFormat: "- **[{{.Component}}]** {{.Body}}"
components:
  - backend
  - frontend
  - infra
  - ci
  - tooling
  - docs
kinds:
  - label: Added
    key: added
    auto: minor
  - label: Changed
    key: changed
    auto: minor
  - label: Deprecated
    key: deprecated
    auto: minor
  - label: Removed
    key: removed
    auto: major
  - label: Fixed
    key: fixed
    auto: patch
  - label: Security
    key: security
    auto: patch
replacements:
  - path: backend/pyproject.toml
    find: '(?m)^version = ".*"'
    replace: 'version = "{{.VersionNoPrefix}}"'
  - path: frontend/package.json
    find: '(?m)^  "version": ".*"'
    replace: '  "version": "{{.VersionNoPrefix}}"'
  - path: infra/charts/backend/values.yaml
    find: '(?m)^  tag: v.*'
    replace: '  tag: v{{.VersionNoPrefix}}'
  - path: infra/charts/backend/Chart.yaml
    find: '(?m)^appVersion: ".*"'
    replace: 'appVersion: "{{.VersionNoPrefix}}"'
