pre-commit:
  parallel: true
  commands:
    gitleaks:
      desc: Scan staged changes for secrets before they are committed
      tags: security
      run: gitleaks protect --staged --no-banner --verbose
    large-added-files:
      desc: Prevent accidental commit of large binary files
      run: scripts/check-added-files-size.sh {staged_files}
    backend-lint:
      desc: Run Ruff linter on staged Python files
      root: "backend"
      glob: "**/*.py"
      run: uv run ruff check {staged_files}
    backend-format:
      desc: Verify Python code formatting with Ruff
      root: "backend"
      glob: "**/*.py"
      run: uv run ruff format --check {staged_files}
    frontend-lint:
      desc: Run Biome linter on staged Next.js/React files
      root: "frontend"
      glob: "src/**/*.{js,ts,jsx,tsx,json}"
      run: bunx biome check --write {staged_files}
    frontend-format:
      desc: Verify frontend code formatting with Biome
      root: "frontend"
      glob: "src/**/*.{js,ts,jsx,tsx,json}"
      run: bunx biome format --write {staged_files}

pre-push:
  parallel: true
  commands:
    semgrep:
      desc: Run Semgrep security scan
      tags: security
      run: scripts/run-semgrep.sh
    gitleaks:
      desc: Final full-repository secret scan before pushing
      tags: security
      run: gitleaks detect --source . --no-banner --redact
    backend-typecheck:
      desc: Run static type checking on backend code
      root: "backend"
      run: uv run ty check
    backend-test:
      desc: Execute backend unit and integration tests
      root: "backend"
      run: uv run pytest
    frontend-build:
      desc: Verify frontend build compiles cleanly before pushing
      root: "frontend"
      run: bun run build
