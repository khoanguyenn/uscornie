pre-commit:
  parallel: true
  commands:
    gitleaks:
      desc: Scan staged changes for secrets before they are committed
      tags: security
      run: gitleaks protect --staged --no-banner --verbose
    staged-diff-check:
      desc: Check for whitespace errors and conflict markers in staged changes
      run: git diff --cached --check
    large-added-files:
      desc: Prevent accidental commit of large binary files
      run: scripts/check-added-files-size.sh {staged_files}
    backend-lint:
      desc: Run Ruff linter on staged Python files
      root: "backend"
      glob: "**/*.py"
      run: uv run ruff check {staged_files}
    backend-format:
      desc: Verify Python code formatting with Ruff
      root: "backend"
      glob: "**/*.py"
      run: uv run ruff format --check {staged_files}
    frontend-lint:
      desc: Run ESLint on staged Javascript and Vue files
      root: "frontend"
      glob: "src/**/*.{js,vue}"
      run: npm run lint
    frontend-format:
      desc: Verify frontend code formatting
      root: "frontend"
      glob: "src/**/*.{js,vue}"
      run: npm run fmt:check

pre-push:
  parallel: true
  commands:
    gitleaks:
      desc: Final full-repository secret scan before pushing
      tags: security
      run: gitleaks detect --source . --no-banner --redact
    backend-typecheck:
      desc: Run static type checking on backend code
      root: "backend"
      run: uv run ty check
    backend-test:
      desc: Execute backend unit and integration tests
      root: "backend"
      run: uv run pytest
    frontend-test:
      desc: Execute frontend unit tests
      root: "frontend"
      run: npm run test:run
