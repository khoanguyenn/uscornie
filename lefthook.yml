pre-commit:
  parallel: true
  commands:
    staged-diff-check:
      run: git diff --cached --check
    large-added-files:
      run: scripts/check-added-files-size.sh
    backend-lint:
      root: "backend"
      glob: "**/*.py"
      run: uv run ruff check {staged_files}
    backend-format:
      root: "backend"
      glob: "**/*.py"
      run: uv run ruff format --check {staged_files}
    frontend-lint:
      root: "frontend"
      glob: "src/**/*.{js,vue}"
      run: npm run lint
    frontend-format:
      root: "frontend"
      glob: "src/**/*.{js,vue}"
      run: npm run fmt:check

pre-push:
  parallel: true
  commands:
    secret-scan:
      run: gitleaks dir --no-banner --redact .
    backend-typecheck:
      root: "backend"
      run: uv run ty check
    backend-test:
      root: "backend"
      run: uv run pytest
    frontend-test:
      root: "frontend"
      run: npm run test:run
