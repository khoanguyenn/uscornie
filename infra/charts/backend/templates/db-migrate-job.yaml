{{- if .Values.migration.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: uscornie-db-migrate-{{ .Values.image.tag | replace "." "-" }}
  labels:
    app: uscornie-db-migrate
  annotations:
    {{- if .Values.argoCD }}
    # ArgoCD sync hooks (deploy with argoCD)
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,Succeeded
    {{- else }}
    # Standard Helm lifecycle hooks
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- end }}
spec:
  template:
    metadata:
      name: uscornie-db-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: uscornie-db-app
                  key: uri
          envFrom:
            - secretRef:
                name: uscornie-secrets
{{- end }}
