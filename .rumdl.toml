[global]
disable = [
    "MD013", # line length
    "MD041", # first line heading
]

# Directories and patterns excluded from markdown linting
exclude = [
    ".agent",
    ".git",
    "node_modules",
    "backend/.venv",
    "frontend/.next",
    "frontend-vue/node_modules",
    "**/.pytest_cache",
    "**/.ruff_cache"
]
